name: Build Dev Client APK

on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: false
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Cache node_modules
        id: cache-node
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node.outputs.cache-hit != 'true'
        run: npm ci

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ hashFiles('android/**/*.gradle*') }}-

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Find APK
        run: |
          echo "=== android/app/build/outputs ==="
          find android/app/build/outputs -name "*.apk" 2>/dev/null || echo "outputs dir empty or missing"
          echo "=== android/app/build ==="
          ls android/app/build/ 2>/dev/null || echo "build dir missing"

      - name: Upload dev client APK
        uses: actions/upload-artifact@v5
        with:
          name: pratfill-dev-client
          path: android/app/build/outputs/apk/release/*.apk
