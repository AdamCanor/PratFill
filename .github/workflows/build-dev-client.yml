name: Build Dev Client APK

on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android/sdk/ndk/21* \
            /usr/local/lib/android/sdk/ndk/23* /usr/local/lib/android/sdk/ndk/25* \
            /opt/hostedtoolcache/CodeQL /opt/hostedtoolcache/go \
            /opt/hostedtoolcache/Ruby /opt/hostedtoolcache/PyPy
          sudo apt-get clean
          df -h

      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Cache node_modules
        id: cache-node
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node.outputs.cache-hit != 'true'
        run: npm ci

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ hashFiles('android/**/*.gradle*') }}-

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon -Pandroid.injected.build.abi=arm64-v8a

      - name: Upload dev client APK
        uses: actions/upload-artifact@v5
        with:
          name: pratfill-dev-client
          path: android/app/build/outputs/apk/debug/app-debug.apk
