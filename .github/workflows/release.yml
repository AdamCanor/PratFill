name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.sha }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          build-scan-publish: false

      - name: Embed build SHA
        run: |
          SHA=$(git rev-parse --short HEAD)
          node -e "
            const fs = require('fs');
            const app = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            app.expo.extra = { ...(app.expo.extra || {}), buildSha: '$SHA' };
            fs.writeFileSync('app.json', JSON.stringify(app, null, 2) + '\n');
          "

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --parallel --no-configuration-cache -x lintVitalAnalyzeRelease -PreactNativeArchitectures=armeabi-v7a,arm64-v8a

      - name: Get release tag
        id: tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          SHA=$(git rev-parse --short HEAD)
          echo "tag=v${VERSION}-${SHA}" >> $GITHUB_OUTPUT
          echo "title=v${VERSION}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APKS=$(find android/app/build/outputs/apk/release -name "*.apk" | tr '\n' ' ')
          if [ -z "$APKS" ]; then echo "No APKs found!" && exit 1; fi
          gh release create "${{ steps.tag.outputs.tag }}" $APKS \
            --title "${{ steps.tag.outputs.title }}" \
            --generate-notes
